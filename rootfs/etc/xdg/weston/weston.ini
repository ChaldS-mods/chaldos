# ChaldOS Weston Configuration
# ============================
# Wayland compositor config with pixel-art wallpapers

[core]
# DRM backend with pixman software renderer (no Mesa/GL needed)
backend=drm-backend.so
shell=desktop-shell.so
# Don't blank the screen
idle-time=0
# Required by weston for runtime dir
# (xdg_runtime_dir is set by start-weston)
use-gl=0

[shell]
# Panel on the bottom! ヽ(•‿•)ノ
panel-position=bottom
panel-locked=true
# Desktop shell client binary
client=/usr/libexec/weston-desktop-shell
# Background color (dark blue-gray, visible before wallpaper loads)
background-color=0x1a1a2e

[keyboard]
# Default keyboard layout
keymap_layout=us

[keymap]
# With variant if needed
variant=

[launcher]
# ChaldOS Start Menu — the "Start" button!
icon=/usr/share/weston/chaldos-start.png
path=/usr/bin/weston-terminal -e /usr/bin/chaldos-menu

[launcher]
# Terminal
icon=/usr/share/weston/terminal.png
path=/usr/bin/weston-terminal

[launcher]
# Flower demo
icon=/usr/share/weston/icon.png
path=/usr/bin/weston-flower

[output]
# Auto-detect outputs. Weston manages multi-monitor internally.
# Specific output config can go here:
# name=LVDS1
# mode=3840x2160
# scale=2

[screensaver]
# Disable screensaver
path=/usr/libexec/weston-screensaver
duration=0

[input-method]
path=
