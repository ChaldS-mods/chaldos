# ChaldOS Build Configuration
# ============================
# Edit this file to customize your ChaldOS build.

# --- Version ---
CHALDOS_VERSION = 2.0.0
CHALDOS_CODENAME = "Gaming Edition"

# --- Architecture ---
CHALDOS_BASE = "Arch Linux"
BUILD_ARCH = x86_64

# --- Desktop Environments ---
# Доступны: kde, gnome, xfce, hyprland, sway, budgie, cinnamon, mate, i3, none
DESKTOP_ENVIRONMENT = "kde"
# Display Manager: sddm, gdm, lightdm, ly, none
DISPLAY_MANAGER = "sddm"

# --- GPU Drivers ---
# Доступны: nvidia, nvidia-open, nvidia-dkms, nvidia-lts, nouveau,
#           amdgpu, amd-pro, intel, intel-compute, virtio
GPU_DRIVER = "amdgpu"

# --- Gaming Packages ---
# Список через пробел: steam lutris heroic obs mangohud wine proton-ge
# gamescope gamemode discord prism vulkan
GAMING_PACKAGES = "steam lutris mangohud gamemode"

# --- DaVinci Resolve ---
# false, studio, free, manual
INSTALL_DAVINCI = "false"

# --- Installation Options ---
# Пользовательский shell: bash, zsh, fish
USER_SHELL = "bash"
# Часовой пояс
TIMEZONE = "Europe/Moscow"
# Раскладка клавиатуры
KEYMAP = "us"
# Локаль
LOCALE = "en_US.UTF-8"
