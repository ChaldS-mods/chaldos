# ChaldOS — GRUB EFI config (for EFI boot via GRUB)

set default="chaldos"
set timeout="15"
set gfxmode="auto"
set gfxpayload="keep"

insmod all_video

if loadfont unicode; then
    terminal_output gfxterm
fi

# ChaldOS entries
menuentry "🔵 ChaldOS Gaming Edition v2.0" {
    linux /%INSTALL_DIR%/boot/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisodevice=UUID=${ARCHISO_UUID} quiet splash
    initrd /%INSTALL_DIR%/boot/initramfs-linux.img
}

menuentry "🔵 ChaldOS (Verbose)" {
    linux /%INSTALL_DIR%/boot/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisodevice=UUID=${ARCHISO_UUID} loglevel=7
    initrd /%INSTALL_DIR%/boot/initramfs-linux.img
}

menuentry "🔵 ChaldOS (Safe Mode)" {
    linux /%INSTALL_DIR%/boot/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisodevice=UUID=${ARCHISO_UUID} nomodeset
    initrd /%INSTALL_DIR%/boot/initramfs-linux.img
}

menuentry "Boot from Hard Disk" {
    set root=(hd0)
    chainloader +1
}

menuentry "Reboot" { reboot }
menuentry "Shutdown" { halt }
