# ChaldOS — BIOS kernel boot entries
LABEL chaldos
TEXT HELP
Загрузить ChaldOS Gaming Edition v2.0
Live-окружение для установки системы на диск.
ENDTEXT
MENU LABEL 🔵 ChaldOS Gaming Edition v2.0
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet splash

LABEL verbose
TEXT HELP
Загрузить ChaldOS с подробным выводом.
Для диагностики проблем с загрузкой.
ENDTEXT
MENU LABEL 🔵 ChaldOS (Verbose)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% loglevel=7

LABEL safemode
TEXT HELP
Загрузить ChaldOS в безопасном режиме.
Без драйверов GPU, для совместимости.
ENDTEXT
MENU LABEL 🔵 ChaldOS (Safe Mode)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% nomodeset

LABEL copytoram
TEXT HELP
Скопировать ISO в RAM перед загрузкой.
Полезно для очень медленных носителей.
ENDTEXT
MENU LABEL 🔵 ChaldOS (Copy to RAM)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% copytoram
