# ChaldOS — SYSLINUX BIOS boot configuration
# Used for BIOS legacy boot when GRUB is not available

DEFAULT chaldos
PROMPT 1
TIMEOUT 150
UI menu.c32
MENU TITLE ChaldOS Gaming Edition v2.0

LABEL chaldos
    MENU LABEL 🔵 ChaldOS Gaming Edition v2.0
    LINUX /%INSTALL_DIR%/boot/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisodevice=UUID=${ARCHISO_UUID} quiet splash

LABEL verbose
    MENU LABEL 🔵 ChaldOS (Verbose)
    LINUX /%INSTALL_DIR%/boot/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisodevice=UUID=${ARCHISO_UUID} loglevel=7

LABEL safemode
    MENU LABEL 🔵 ChaldOS (Safe Mode)
    LINUX /%INSTALL_DIR%/boot/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisodevice=UUID=${ARCHISO_UUID} nomodeset

LABEL hdd
    MENU LABEL 💾 Boot from Hard Disk
    COM32 chain.c32
    APPEND hd0

LABEL reboot
    MENU LABEL 🔄 Reboot
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL ⏻ Shutdown
    COM32 poweroff.c32
