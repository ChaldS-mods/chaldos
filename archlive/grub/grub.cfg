# ChaldOS — GRUB configuration for BIOS boot

set default="chaldos"
set timeout="15"
set gfxmode="auto"
set gfxpayload="keep"

insmod all_video
insmod gfxterm
insmod png
insmod gfxmenu

# Load fonts
if loadfont unicode; then
    terminal_output gfxterm
fi

insmod gzio

# ChaldOS boot entries
menuentry "🔵 ChaldOS Gaming Edition v2.0" --class arch --class chaldos {
    set_theme "${prefix}/themes/chaldos/theme.txt"
    linux /%INSTALL_DIR%/boot/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisodevice=UUID=${ARCHISO_UUID} quiet splash
    initrd /%INSTALL_DIR%/boot/initramfs-linux.img
}

menuentry "🔵 ChaldOS (Verbose / Debug)" --class arch --class chaldos {
    linux /%INSTALL_DIR%/boot/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisodevice=UUID=${ARCHISO_UUID} loglevel=7
    initrd /%INSTALL_DIR%/boot/initramfs-linux.img
}

menuentry "🔵 ChaldOS (Safe Mode, no KMS)" --class arch --class chaldos {
    linux /%INSTALL_DIR%/boot/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisodevice=UUID=${ARCHISO_UUID} nomodeset
    initrd /%INSTALL_DIR%/boot/initramfs-linux.img
}

menuentry "💾 Copy to RAM (for slow media)" --class arch --class chaldos {
    linux /%INSTALL_DIR%/boot/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisodevice=UUID=${ARCHISO_UUID} cow_spacesize=2G
    initrd /%INSTALL_DIR%/boot/initramfs-linux.img
}

submenu "🔧 Advanced Options" {
    menuentry "Boot from first hard disk" {
        set root=(hd0)
        chainloader +1
    }
    menuentry "Reboot" {
        reboot
    }
    menuentry "Shutdown" {
        halt
    }
}
